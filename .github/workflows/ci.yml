name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: core is wire- and terminal-free (architecture.md §2)
        run: |
          if cargo tree -p tokio-agent-core -e normal | grep -E '\b(reqwest|ratatui|crossterm)\b'; then
            echo "tokio-agent-core must not depend on HTTP or terminal crates" >&2
            exit 1
          fi
      - name: ProviderMetadata::from_provider is Adapter-only (ADR-0006)
        run: |
          violations=$(grep -rn 'from_provider(' crates --include='*.rs' \
            | grep -v '^crates/provider/' \
            | grep -v '^crates/core/src/message.rs' \
            | grep -v '/tests/' || true)
          if [ -n "$violations" ]; then
            echo "ProviderMetadata may only be constructed below the Provider seam:" >&2
            echo "$violations" >&2
            exit 1
          fi
