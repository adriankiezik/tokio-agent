manifest_version = 1
id = "tokio.loop"
name = "Loop"
version = "1.0.2"
description = "Run a prompt repeatedly on a fixed-delay interval"
license = "MIT"
host_api = ">=1.0, <2.0"

[runtime]
component = "component/extension.wasm"

[[commands]]
name = "loop"
description = "Run a prompt repeatedly on an interval"
usage = "/loop <10s|5m|2h> <prompt> | cancel"
handler = "loop_command"
available_while_running = true

[[status]]
id = "loop"
side = "left"
priority = 90
handler = "loop_status"

[capabilities]
session_observe = true
session_submit_automatic = true
session_schedule = true
status_write = true
storage_session = true
